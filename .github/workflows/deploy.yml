name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Opt into the Node 24 runtime for JavaScript actions ahead of the
# June 2026 deprecation of Node 20 on GitHub Actions runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Permissions needed by the Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time, but don't cancel in-flight ones — let
# them finish so we don't end up with a partially-deployed site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all workspace packages
        # Topological order: schema -> core -> web. The web package
        # imports from core's built dist/, so all deps must build first.
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
